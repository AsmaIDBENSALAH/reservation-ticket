# Nom du service
spring:
  application:
    name: gateway-service

  main:
    web-application-type: reactive
    allow-bean-definition-overriding: true

  security:
    oauth2:
      client:
        provider:
          keycloak:
            issuer-uri: http://localhost:8085/realms/football-realme
        registration:
          keycloak:
            provider: keycloak
            client-id: gateway-service
            client-secret: NKhYPwtFIdfNRCqcToCA6ZCQIYr5Jeks
            scope: openid, profile, email
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8085/realms/football-realme

  cloud:
    gateway:
      discovery:
        locator:
          enabled: true

      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins:
              - "http://localhost:5173"
              - "http://localhost:3000"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
            allowCredentials: true

      routes:
        - id: reservation-server
          uri: lb://RESERVATION-SERVER
          predicates:
            - Path=/api/reservations/**
          filters:
            - TokenRelay=

        - id: payment-server
          uri: lb://PAYMENT-SERVER
          predicates:
            - Path=/api/payment/**

        - id: match-server
          uri: lb://MATCH-SERVER
          predicates:
            - Path=/api/**
          filters:
            - name: Retry
              args:
                retries: 3
                statuses:
                  - INTERNAL_SERVER_ERROR
                methods: GET,POST,PUT,DELETE
                backoff:
                  firstBackoff: 1s
                  maxBackoff: 5s

server:
  port: 8084

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    register-with-eureka: true
    fetch-registry: true