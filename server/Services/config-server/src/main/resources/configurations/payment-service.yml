server:
  port: 8086

stripe:
  api:
    key: sk_test_51T3bBWA2NvUruEALK0HOrDYI68tirObpS4Xj6xVEfpv48UVInK6wD9LU8PR7cULDb9HtrI1QKXYjzHfXvSrYgK6600nTSyYDxT

spring:
  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: payment-group
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "*"
        spring.json.use.type.headers: false
        spring.json.value.default.type: com.odc.paymentserver.dto.PaymentRequestEvent
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: false  

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8085/realms/football-realme
