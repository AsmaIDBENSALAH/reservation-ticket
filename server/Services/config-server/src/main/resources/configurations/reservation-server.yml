spring:
  application:
    name: reservation-server

server:
  port: 8083

spring:
  datasource:
    url: jdbc:postgresql://localhost:5433/reservationdb
    username: admin
    password: admin
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect
  security:
    user:
      name: admin
      password: admin123
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8085/realms/football-realme

eureka:
  client:
    service-url:
      defaultZone: http://eureka-server:8761/eureka/
    register-with-eureka: true
    fetch-registry: true

spring:
  cloud:
    openfeign:
      circuitbreaker:
        enabled: true

spring:
  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: reservation-group
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "*"
        spring.json.use.type.headers: false
        spring.json.value.default.type: com.odc.reservationserver.dto.events.PaymentResponseEvent
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: false