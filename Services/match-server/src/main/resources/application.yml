spring.application.name=match-server
spring.main.allow-bean-definition-overriding=true
server.port=8082

spring.datasource.url=jdbc:postgresql://localhost:5432/matchdb
spring.datasource.username=admin
spring.datasource.password=admin
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect


# ========== RESOURCE SERVER (pour verifier les JWT entrants) ==========
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:8085/realms/football-realme

spring.config.import=configserver:http://localhost:8888

# =====================
# Eureka Client Config
# =====================
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true


logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE